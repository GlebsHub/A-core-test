name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Configure npm for @alphacore (GitLab registry)
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::Add repo secret NPM_TOKEN (GitLab deploy token / personal access token with read_package_registry). See .npmrc.example in the repo."
            exit 1
          fi
          echo "@alphacore:registry=https://gitlab.alphacore.ru/api/v4/projects/15/packages/npm/" >> .npmrc
          echo "//gitlab.alphacore.ru/api/v4/projects/15/packages/npm/:_authToken=${NPM_TOKEN}" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
